<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Tracker Pro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('debt-section', this)">New Debt</button>
    <button class="tab-btn" onclick="switchTab('payment-section', this)">Payment</button>
  </div>

  <form id="debt-section" class="tab-content active" onsubmit="handleFormSubmit(event, 'Debt')">
    <div class="header">
      <h2>Record Debt</h2>
      <p>Enter details for a new borrower</p>
    </div>

    <div class="form-group">
      <label for="name">Borrower Name</label>
      <input type="text" id="name" placeholder="Full name" required>
    </div>

    <div class="form-group">
      <label for="type">Platform</label>
      <select id="type">
        <option value="Shopee">Shopee</option>
        <option value="Maribank">Maribank</option>
        <option value="Cash">Cash</option>
        <option value="Kits">Kits</option>
      </select>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="amount">Amount</label>
        <div class="input-wrapper">
          <span class="currency-symbol">₱</span>
          <input type="number" id="amount" placeholder="0.00" step="0.01" required>
        </div>
      </div>
      <div class="form-group">
        <label for="term">Term (Months)</label>
        <input type="number" id="term" placeholder="e.g. 3" min="1">
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" placeholder="Item or reason">
    </div>

    <button type="submit" class="main-btn">Save Debt Entry</button>
  </form>

  <form id="payment-section" class="tab-content" onsubmit="handleFormSubmit(event, 'Payment')">
    <div class="header">
      <h2>Record Payment</h2>
      <p>Update balance when someone pays</p>
    </div>

    <div class="form-group">
      <label for="loan-select">Customer / Loan</label>
      <select id="loan-select" required>
        <option value="">Select Loan</option>
      </select>
      <small id="loan-customer-name" class="helper-text"></small>
    </div>

    <div class="form-group">
      <label for="pay-amount">Amount Paid</label>
      <div class="input-wrapper">
        <span class="currency-symbol">₱</span>
        <input type="number" id="pay-amount" placeholder="0.00" step="0.01" required>
      </div>
    </div>

    <div class="form-group">
      <label for="pay-method">Payment Method</label>
      <select id="pay-method">
        <option value="GCash">GCash</option>
        <option value="Maya">Maya</option>
        <option value="Cash">Cash</option>
        <option value="Bank Transfer">Bank Transfer</option>
      </select>
    </div>

    <button type="submit" class="main-btn">Confirm Payment</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
